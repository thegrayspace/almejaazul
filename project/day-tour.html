<html lang="en">
<head>

<style>
.dt-hero{min-height:55vh;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:0 72px 80px;}
.dt-hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=2400&q=90') center 30%/cover;animation:hZoom 20s ease-in-out infinite alternate;}
@keyframes hZoom{from{transform:scale(1.03)}to{transform:scale(1.08)}}
.dt-hero-vgn{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,37,48,0.90) 0%,rgba(26,37,48,0.2) 60%,transparent 100%);}
.dt-hero-content{position:relative;z-index:1;}
.dt-hero-content p.eyebrow{font-size:10px;font-weight:600;letter-spacing:0.26em;text-transform:uppercase;color:var(--c-brand);margin-bottom:16px;opacity:0;transform:translateY(12px);animation:fUp 0.9s var(--ease) 0.3s forwards;}
.dt-hero-content h1{opacity:0;animation:fUp 0.9s var(--ease) 0.5s forwards;}
.dt-hero-content .sub{font-size:15px;color:rgba(255,255,255,0.60);font-weight:300;line-height:1.75;max-width:480px;margin-top:16px;opacity:0;animation:fUp 0.9s var(--ease) 0.7s forwards;}

/* passes */
.passes-section{padding:100px 72px;background:var(--c-oyster);}
.passes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:56px;}
.pass-card{background:#fff;border-radius:8px;box-shadow:0 2px 16px rgba(26,37,48,0.07);transition:transform 0.4s var(--ease),box-shadow 0.4s;cursor:pointer;}
.pass-card:hover{transform:translateY(-8px);box-shadow:0 20px 56px rgba(26,37,48,0.13);}
.pass-card-top{padding:32px 28px 24px;border-bottom:1px solid var(--c-sand);}
.pass-icon{color:var(--c-brand);margin-bottom:16px;line-height:0;}
.pass-price{font-family:var(--ff-s);font-size:56px;font-weight:300;color:var(--c-brand);line-height:1;}
.pass-price small{font-family:var(--ff-n);font-size:14px;font-weight:300;color:rgba(26,37,48,0.45);}
.pass-name{font-size:13px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--c-ink);margin-top:8px;}
.pass-card-body{padding:24px 28px;}
.pass-includes{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.pass-includes li{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:300;color:rgba(26,37,48,0.70);}
.pass-includes li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--c-brand);flex-shrink:0;}
.pass-note{font-size:12px;color:rgba(26,37,48,0.45);border-top:1px solid var(--c-sand);padding-top:16px;line-height:1.6;}

/* addons */
.addons-section{padding:100px 72px;background:var(--c-sand);}
.addons-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:56px;}
.addon-tile{background:#fff;border-radius:6px;padding:24px 20px;transition:transform 0.35s var(--ease),box-shadow 0.35s;}
.addon-tile:hover{transform:translateY(-5px);box-shadow:0 12px 36px rgba(26,37,48,0.10);}
.addon-icon{color:var(--c-brand);margin-bottom:12px;line-height:0;}
.addon-name{font-family:var(--ff-s);font-size:22px;font-weight:300;margin-bottom:6px;}
.addon-price{font-size:16px;font-weight:500;color:var(--c-brand);margin-bottom:8px;}
.addon-desc{font-size:12px;font-weight:300;color:rgba(26,37,48,0.55);line-height:1.6;}

/* schedule */
.schedule-section{padding:100px 72px;background:var(--c-teal);}
.schedule-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;margin-top:56px;align-items:start;}
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:20px;padding-bottom:28px;position:relative;}
.tl-item::before{content:'';position:absolute;left:19px;top:36px;bottom:0;width:1px;background:rgba(75,191,224,0.25);}
.tl-item:last-child::before{display:none;}
.tl-dot{width:40px;height:40px;border-radius:50%;background:rgba(75,191,224,0.15);border:1.5px solid rgba(75,191,224,0.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:rgba(75,191,224,0.9);}
.tl-time{font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--c-brand);margin-bottom:4px;}
.tl-act{font-family:var(--ff-s);font-size:20px;font-weight:300;color:#fff;margin-bottom:4px;}
.tl-note{font-size:12px;font-weight:300;color:rgba(255,255,255,0.50);}
.schedule-img-stack img{width:100%;border-radius:6px;margin-bottom:14px;}
.schedule-img-stack img:last-child{margin-bottom:0;}

/* FAQ */
.faq-section{padding:100px 72px;background:var(--c-oyster);}
.faq-list{max-width:720px;margin-top:56px;}
.faq-item{border-bottom:1px solid var(--c-sand);padding:22px 0;}
.faq-q{font-family:var(--ff-s);font-size:22px;font-weight:300;color:var(--c-ink);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;}
.faq-q .arr{color:var(--c-brand);font-size:18px;transition:transform 0.3s;}
.faq-a{font-size:14px;font-weight:300;color:rgba(26,37,48,0.65);line-height:1.8;padding-top:12px;max-height:0;overflow:hidden;transition:max-height 0.4s var(--ease);}
.faq-item.open .faq-q .arr{transform:rotate(45deg);}
.faq-item.open .faq-a{max-height:200px;}

/* ── MOBILE ── */
@media (max-width: 1024px) {
  .passes-grid { grid-template-columns: 1fr; }
  .addons-grid { grid-template-columns: 1fr 1fr; }
  .schedule-grid { grid-template-columns: 1fr; gap: 40px; }
}
@media (max-width: 720px) {
  .dt-hero { padding: 0 24px 56px; min-height: 380px; }
  .passes-section, .addons-section, .schedule-section, .faq-section { padding: 56px 24px; }
  .pass-card-top { padding: 24px 22px 20px; }
  .pass-price { font-size: 44px; }
  .pass-card-body { padding: 20px 22px; }
  .addons-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .addon-tile { padding: 18px 14px; }
  .addon-name { font-size: 18px; }
  .addon-price { font-size: 14px; }
  .addon-desc { font-size: 11px; }
  .tl-act { font-size: 17px; }
  .faq-q { font-size: 18px; }
  .faq-a { font-size: 13px; }
}
</style>
</head>

<script type="text/babel">
const {useState}=React;
const FAQS=[
  {q:'How do I get to Almeja Azul?',a:'Take a ferry from Sasa or Santa Ana Port in Davao City to Samal Island (Babak Terminal). From there, take a habal-habal or book a van transfer through us. Total transit from Davao City: approximately 45–60 minutes.'},
  {q:'Can I just show up without a reservation?',a:'Yes! Day tour guests are welcome on a walk-in basis subject to capacity. However, we recommend messaging us first on Facebook to confirm availability, especially on weekends and holidays.'},
  {q:'Are pets allowed for the day tour?',a:'Absolutely. Almeja Azul is a pet-friendly resort. Bring your furry family members — they are welcome on the beach and resort grounds.'},
  {q:'What is the pool schedule?',a:'The infinity pool is open from dawn to dusk daily. Pool access for day guests requires the ₱300 day pass (beach + pool) or a ₱100 add-on to the basic seaside pass.'},

  {q:'Is WiFi available for day guests?',a:'Yes. High-speed fiber WiFi is available throughout the resort, including common areas and the beach. Perfect for the remote worker taking a beach day.'},

const PASS_DATA=[
  {key:'seaside',name:'Seaside Day Pass',Icon:IconUmbrella,tag:'Beach Access · Per Person',

   pricing:[{label:'Per Hour',price:'₱80',note:'min. 2 hrs'},{label:'Half Day',price:'₱150',note:'up to 6 hrs'},{label:'Full Day',price:'₱200',note:'dawn to dusk'}],
   includes:['Both beach fronts','Shoreline lounge areas','Restroom facilities','High-speed WiFi','Open daily · Dawn to dusk'],
   note:'Pets welcome. Walk-ins always accepted. Add pool for ₱100 more.',unit:'per person'},
  {key:'pool',name:'Beach + Pool Pass',Icon:IconWaves,tag:'Most Popular · Per Person',
   img:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=700&q=80',
   pricing:[{label:'Per Hour',price:'₱120',note:'min. 2 hrs'},{label:'Half Day',price:'₱200',note:'up to 6 hrs'},{label:'Full Day',price:'₱300',note:'dawn to dusk'}],

function PassModal({pass,onClose}){
  const [on,setOn]=React.useState(false);
  React.useEffect(()=>{const t=setTimeout(()=>setOn(true),10);const esc=e=>e.key==='Escape'&&onClose();document.addEventListener('keydown',esc);document.body.style.overflow='hidden';return()=>{clearTimeout(t);document.removeEventListener('keydown',esc);document.body.style.overflow='';};},[]);
  return(
    <div className={`mOverlay${on?' on':''}`} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="m-gallery"><img src={pass.img} alt={pass.name}/><button className="m-close" onClick={onClose}>✕</button></div>
        <div className="m-body">
          <div style={{color:'var(--c-brand)',lineHeight:0,marginBottom:14}}><pass.Icon size={34}/></div>
          <p className="m-tag">{pass.tag}</p>
          <h2 className="m-name">{pass.name}</h2>
          <p className="m-meta">{pass.unit}</p>
          <div className="m-hr"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:22}}>
            {pass.pricing.map(p=>(
              <div key={p.label} style={{background:'var(--c-sand)',borderRadius:6,padding:'14px 10px',textAlign:'center'}}>
                <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(26,37,48,0.45)',marginBottom:6}}>{p.label}</p>
                <p style={{fontFamily:'var(--ff-s)',fontSize:26,fontWeight:300,color:'var(--c-brand)',lineHeight:1}}>{p.price}</p>
                <p style={{fontSize:10,color:'rgba(26,37,48,0.45)',marginTop:4}}>{p.note}</p>
              </div>
            ))}
          </div>
          <div className="m-amenities">{pass.includes.map(i=><div key={i} className="m-amen-item">{i}</div>)}</div>
          <p className="m-note" style={{marginTop:12}}>{pass.note}</p>
          <div className="m-ctas">
            <a href="https://m.me/AlmejaAzulResort" target="_blank" className="m-book">Book on Messenger</a>
            <a href="tel:09993088800" className="m-book-fb" style={{display:'flex',alignItems:'center',gap:8,justifyContent:'center'}}><IconPhone size={14}/>0999 308 8800</a>
          </div>
        </div>
      </div>
    </div>
  );
}

            <div className="pass-card-top">
              <div className="pass-icon"><IconWaves size={44}/></div>

        <div>
