<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concepts & Future Projects — Almeja Azul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --c-blue:     oklch(0.62 0.07 205);
  --c-teal:     oklch(0.30 0.09 195);
  --c-seaglass: oklch(0.72 0.06 197);
  --c-sand:     oklch(0.92 0.02 82);
  --c-oyster:   oklch(0.97 0.01 84);
  --c-sage:     oklch(0.58 0.09 148);
  --c-ink:      oklch(0.17 0.04 210);
  --ff-s: 'Cormorant Garamond', Georgia, serif;
  --ff-n: 'Plus Jakarta Sans', system-ui, sans-serif;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--c-ink); color: #fff; font-family: var(--ff-n); font-weight: 300; overflow-x: hidden; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--c-ink); }
::-webkit-scrollbar-thumb { background: var(--c-seaglass); }

/* ── NAV ── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 56px;
  background: rgba(23,28,36,0.85);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.nav-logo { font-family: var(--ff-s); font-size: 20px; font-weight: 400; color: #fff; text-decoration: none; letter-spacing: 0.05em; }
.nav-logo em { font-style: italic; color: var(--c-seaglass); }
.nav-back { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.3s; }
.nav-back:hover { color: var(--c-seaglass); }
.nav-back::before { content: '←'; font-size: 14px; }

/* ── ARCHIVE HERO ── */
.arc-hero {
  padding: 160px 80px 100px;
  background: var(--c-ink);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.arc-badge {
  display: inline-block; padding: 6px 16px; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 100px; font-size: 10px; font-weight: 600; letter-spacing: 0.22em;
  text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 32px;
}
.arc-title { font-family: var(--ff-s); font-size: clamp(48px, 6vw, 88px); font-weight: 300; line-height: 0.96; margin-bottom: 28px; }
.arc-title em { font-style: italic; color: var(--c-seaglass); }
.arc-sub { font-size: 15px; font-weight: 300; color: rgba(255,255,255,0.50); line-height: 1.75; max-width: 520px; }

/* ── SECTION SHARED ── */
.s-label { font-size: 10px; font-weight: 600; letter-spacing: 0.26em; text-transform: uppercase; color: var(--c-seaglass); margin-bottom: 14px; }
.s-title { font-family: var(--ff-s); font-size: clamp(40px, 4.5vw, 68px); font-weight: 300; line-height: 1.04; }
.s-title em { font-style: italic; color: var(--c-seaglass); }

/* ── PICKLEBALL ── */
.pkl { padding: 110px 80px; background: var(--c-ink); position: relative; overflow: hidden; border-top: 1px solid rgba(255,255,255,0.07); }
.pkl-bg { position: absolute; inset: 0; background: url('https://images.unsplash.com/photo-1554068865-24cecd4e34b8?w=1800&q=70') center/cover; opacity: 0.1; }
.pkl-inner { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
.pkl .s-title { color: #fff; }
.pkl-desc { font-size: 14px; color: rgba(255,255,255,0.50); line-height: 1.82; font-weight: 300; margin: 22px 0 38px; }
.pkl-feats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.pkl-feat { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 6px; padding: 22px; transition: background 0.35s, border-color 0.35s; }
.pkl-feat:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); }
.pkl-feat-n { font-family: var(--ff-s); font-size: 34px; font-weight: 300; color: var(--c-seaglass); line-height: 1; margin-bottom: 6px; }
.pkl-feat-l { font-size: 12px; font-weight: 300; color: rgba(255,255,255,0.45); letter-spacing: 0.04em; }
.pkl-visual { position: relative; }
.pkl-img { width: 100%; border-radius: 4px; aspect-ratio: 4/3; object-fit: cover; }
.pkl-glass { position: absolute; bottom: -24px; left: -24px; background: rgba(255,255,255,0.07); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.13); border-radius: 10px; padding: 18px 26px; }
.pkl-glass .gn { font-family: var(--ff-s); font-size: 30px; font-weight: 300; color: var(--c-seaglass); }
.pkl-glass .gl { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.45); }

/* ── ISLA VIDA ── */
.isla { padding: 120px 80px; background: oklch(0.22 0.05 210); display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; border-top: 1px solid rgba(255,255,255,0.07); }
.isla-imgs { display: grid; grid-template-columns: 5fr 3fr; grid-template-rows: 1fr 1fr; gap: 14px; height: 520px; }
.isla-img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
.isla-imgs .img-a { grid-row: 1/3; }
.isla-desc { font-size: 14px; line-height: 1.82; color: rgba(255,255,255,0.55); font-weight: 300; margin: 22px 0 32px; }
.isla-svcs { display: flex; flex-direction: column; gap: 11px; margin-bottom: 38px; }
.isla-svc { display: flex; align-items: center; gap: 14px; padding: 15px 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; cursor: default; transition: transform 0.35s var(--ease), background 0.35s; }
.isla-svc:hover { transform: translateX(8px); background: rgba(255,255,255,0.09); }
.isla-svc-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c-seaglass); flex-shrink: 0; }
.isla-svc-name { flex: 1; font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.80); }
.isla-svc-arr { color: rgba(255,255,255,0.35); }
.btn-teal { padding: 15px 32px; background: var(--c-teal); color: #fff; border: none; border-radius: 100px; font-family: var(--ff-n); font-size: 11px; font-weight: 500; letter-spacing: 0.13em; text-transform: uppercase; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.35s var(--ease); }
.btn-teal:hover { background: var(--c-blue); }

/* ── VIRTUAL SAMAL ── */
.vsam { padding: 110px 80px; background: var(--c-teal); text-align: center; position: relative; overflow: hidden; border-top: 1px solid rgba(255,255,255,0.07); }
.vsam .s-title { color: #fff; margin-bottom: 20px; }
.vsam-desc { font-size: 15px; color: rgba(255,255,255,0.50); max-width: 460px; margin: 0 auto 56px; line-height: 1.78; font-weight: 300; }
.orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.13; pointer-events: none; }
.orb1 { width: 520px; height: 520px; background: var(--c-seaglass); top: -120px; left: -80px; animation: oFloat 14s ease-in-out infinite; }
.orb2 { width: 420px; height: 420px; background: var(--c-blue); bottom: -80px; right: -60px; animation: oFloat 18s ease-in-out infinite reverse; }
@keyframes oFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(28px,18px)} }
.vs-portal { max-width: 820px; margin: 0 auto; position: relative; z-index: 1; }
.vs-canvas { width: 100%; aspect-ratio: 16/9; border-radius: 14px; overflow: hidden; position: relative; background: oklch(0.22 0.07 205); border: 1px solid rgba(255,255,255,0.1); cursor: crosshair; }
.vs-sky { position: absolute; inset: 0 0 46% 0; background: linear-gradient(to bottom, oklch(0.22 0.05 212) 0%, oklch(0.48 0.09 202) 100%); }
.vs-sea { position: absolute; inset: 44% 0 0 0; background: linear-gradient(to bottom, oklch(0.48 0.10 200) 0%, oklch(0.30 0.09 195) 100%); }
.vs-sun { position: absolute; top: 22%; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle, oklch(0.90 0.12 82) 0%, oklch(0.78 0.13 77) 38%, transparent 68%); filter: blur(2px); animation: sunP 5s ease-in-out infinite; }
@keyframes sunP { 0%,100%{opacity:.8;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.06)} }
.vs-water-wrap { position: absolute; inset: 44% 0 0 0; perspective: 480px; overflow: hidden; }
.vs-water-plane { position: absolute; bottom: 0; width: 200%; left: -50%; height: 100%; background: repeating-linear-gradient(90deg,transparent 0 38px,rgba(255,255,255,0.045) 39px 40px), repeating-linear-gradient(0deg,transparent 0 18px,rgba(255,255,255,0.03) 19px 20px); transform: rotateX(62deg); transform-origin: bottom center; animation: wMove 3.5s linear infinite; }
@keyframes wMove { from{background-position:0 0} to{background-position:40px 20px} }
.vs-island { position: absolute; bottom: 53%; left: 50%; transform: translateX(-50%); width: 160px; height: 32px; background: oklch(0.38 0.07 148); border-radius: 50% 50% 0 0; filter: drop-shadow(0 0 18px oklch(0.38 0.06 148 / 0.5)); }
.vs-ui { position: absolute; top:16px; left:16px; display:flex; flex-direction:column; gap:7px; }
.vs-chip { background: rgba(0,0,0,0.38); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; padding: 5px 13px; font-size: 10px; font-weight: 500; letter-spacing: 0.13em; text-transform: uppercase; color: rgba(255,255,255,0.65); text-align: left; }
.vs-compass { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.38); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; font-size: 15px; color: rgba(255,255,255,0.8); animation: cSpin 24s linear infinite; }
@keyframes cSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.vs-hs-wrap { position: absolute; inset: 0; }
.vs-hs { position: absolute; width: 18px; height: 18px; cursor: pointer; }
.vs-hs::before { content:''; position: absolute; inset:3px; border-radius:50%; background: rgba(255,255,255,0.9); }
.vs-hs::after { content:''; position: absolute; inset:-4px; border-radius:50%; border:1px solid rgba(255,255,255,0.35); animation: hsP 2.2s ease-out infinite; }
@keyframes hsP { 0%{transform:scale(.8);opacity:1} 100%{transform:scale(2.6);opacity:0} }
.vs-ctas { display: flex; gap: 14px; justify-content: center; margin-top: 36px; }
.btn-glass { padding: 15px 32px; background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.22); border-radius: 100px; font-family: var(--ff-n); font-size: 11px; font-weight: 500; letter-spacing: 0.13em; text-transform: uppercase; cursor: pointer; text-decoration: none; display: inline-block; backdrop-filter: blur(12px); transition: background 0.35s; }
.btn-glass:hover { background: rgba(255,255,255,0.2); }
.btn-g { padding: 15px 32px; background: transparent; color: rgba(255,255,255,0.75); border: 1px solid rgba(255,255,255,0.3); border-radius: 100px; font-family: var(--ff-n); font-size: 11px; font-weight: 500; letter-spacing: 0.13em; text-transform: uppercase; cursor: pointer; text-decoration: none; transition: all 0.35s; }
.btn-g:hover { background: rgba(255,255,255,0.1); color: #fff; }

/* ── FOOTER ── */
footer { background: oklch(0.12 0.03 210); padding: 52px 80px; border-top: 1px solid rgba(255,255,255,0.07); display: flex; justify-content: space-between; align-items: center; }
.ft-brand { font-family: var(--ff-s); font-size: 20px; font-weight: 300; color: rgba(255,255,255,0.6); }
.ft-brand em { font-style: italic; color: var(--c-seaglass); }
.ft-note { font-size: 12px; font-weight: 300; color: rgba(255,255,255,0.28); }
.ft-back { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.35); text-decoration: none; transition: color 0.3s; }
.ft-back:hover { color: var(--c-seaglass); }

/* ── MOBILE ── */
@media (max-width: 1024px) {
  .pkl-inner { grid-template-columns: 1fr; gap: 48px; }
  .isla { grid-template-columns: 1fr; gap: 48px; padding: 80px 40px; }
  .isla-imgs { height: 380px; }
}
@media (max-width: 720px) {
  .arc-hero { padding: 120px 24px 64px; }
  .pkl, .vsam { padding: 64px 24px; }
  .isla { padding: 64px 24px; }
  .pkl-feats { grid-template-columns: 1fr 1fr; gap: 10px; }
  .pkl-feat { padding: 16px; }
  .pkl-feat-n { font-size: 26px; }
  .isla-imgs { height: 280px; }
  .vs-portal { max-width: 100%; }
  .vs-ctas { flex-direction: column; gap: 10px; padding: 0 12px; }
  .vs-ctas a { text-align: center; }
  footer { padding: 32px 24px; flex-direction: column; gap: 16px; text-align: center; }
}
</style>
</head>
<body>

<nav class="nav">
  <a href="Almeja Azul.html" class="nav-logo">Almeja <em>Azul</em></a>
  <a href="Almeja Azul.html" class="nav-back">Back to Resort</a>
</nav>

<div id="root"></div>

<script type="text/babel">
function VsHotspot({ top, left, label }) {
  const [show, setShow] = React.useState(false);
  return (
    <div style={{position:'absolute', top, left}}>
      <div
        className="vs-hs"
        style={{position:'relative', top:0, left:0}}
        onMouseEnter={()=>setShow(true)}
        onMouseLeave={()=>setShow(false)}
      />
      {show && (
        <div style={{
          position:'absolute', background:'rgba(0,0,0,0.55)', backdropFilter:'blur(12px)',
          borderRadius:'6px', padding:'6px 12px', fontSize:'11px', color:'#fff',
          fontWeight:400, letterSpacing:'0.04em', whiteSpace:'nowrap',
          bottom:'28px', left:'50%', transform:'translateX(-50%)', zIndex:10,
          fontFamily:"'Plus Jakarta Sans',sans-serif",
        }}>{label}</div>
      )}
    </div>
  );
}

function App() {
  return (
    <>
      {/* ARCHIVE HERO */}
      <section className="arc-hero">
        <div className="arc-badge">Concepts & Future Projects</div>
        <h1 className="arc-title">What's <em>Coming</em><br/>to Almeja Azul</h1>
        <p className="arc-sub">This page holds our horizon — three strategic projects in development. The Pickleball Project, Isla Vida Collective, and Virtual Samal are each a distinct chapter in the resort's long-term vision.</p>
      </section>

      {/* PICKLEBALL */}
      <section className="pkl" id="pickleball">
        <div className="pkl-bg" />
        <div className="pkl-inner">
          <div>
            <p className="s-label">Concept 01 — The Pickleball Project</p>
            <h2 className="s-title" style={{color:'#fff'}}>Play at the <em>Edge</em><br/>of the Sea</h2>
            <p className="pkl-desc">Three competition-grade courts positioned at the island's highest point, where the sea breeze meets precision engineering. Tournament infrastructure. Pro coaching on request. The best pickleball in the archipelago — built for the serious player who also knows how to unwind.</p>
            <div className="pkl-feats">
              {[['3','Competition Courts'],['Pro','Coaching On-Site'],['24 h','Court Access'],['LED','Night Lighting']].map(([n,l])=>(
                <div key={l} className="pkl-feat"><div className="pkl-feat-n">{n}</div><div className="pkl-feat-l">{l}</div></div>
              ))}
            </div>
          </div>
          <div className="pkl-visual">
            <img className="pkl-img" src="https://images.unsplash.com/photo-1554068865-24cecd4e34b8?w=800&q=85" alt="Pickleball courts" />
            <div className="pkl-glass">
              <div className="gn">#1</div>
              <div className="gl">Island Facility</div>
            </div>
          </div>
        </div>
      </section>

      {/* ISLA VIDA */}
      <section className="isla" id="isla">
        <div className="isla-imgs">
          <img className="isla-img img-a" src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=700&q=85" alt="Studio" />
          <img className="isla-img" src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=500&q=80" alt="Consulting" />
          <img className="isla-img" src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2?w=500&q=80" alt="Digital" />
        </div>
        <div>
          <p className="s-label">Concept 02 — Isla Vida Collective</p>
          <h2 className="s-title" style={{color:'#fff'}}>Design &amp; <em>Strategy</em></h2>
          <p className="isla-desc">The creative intelligence behind Almeja Azul, offered outward. Isla Vida is our consulting studio — brand strategy, spatial design, and digital experience for property operators who want their resort to think as clearly as it looks.</p>
          <div className="isla-svcs">
            {['Brand Identity & Strategy','Resort UX & Digital Design','Spatial & Interior Concept','Content & Photography Direction'].map(s=>(
              <div key={s} className="isla-svc">
                <div className="isla-svc-dot" />
                <span className="isla-svc-name">{s}</span>
                <span className="isla-svc-arr">→</span>
              </div>
            ))}
          </div>
          <a href="#" className="btn-teal">Work With Us</a>
        </div>
      </section>

      {/* VIRTUAL SAMAL */}
      <section className="vsam" id="virtual">
        <div className="orb orb1" /><div className="orb orb2" />
        <p className="s-label">Concept 03 — Virtual Samal</p>
        <h2 className="s-title">Explore the <em>Island</em></h2>
        <p className="vsam-desc">An interactive spatial portal. Move through the resort before you arrive — in full 3D. Touch the hotspots to explore each zone. Full WebGL experience in development.</p>
        <div className="vs-portal">
          <div className="vs-canvas">
            <div className="vs-sky" />
            <div className="vs-sea" />
            <div className="vs-water-wrap"><div className="vs-water-plane" /></div>
            <div className="vs-sun" />
            <div className="vs-island" />
            <div className="vs-hs-wrap">
              <VsHotspot top="36%" left="28%" label="The Sanctuary" />
              <VsHotspot top="41%" left="54%" label="Pickleball Courts" />
              <VsHotspot top="46%" left="71%" label="The Beach" />
            </div>
            <div className="vs-ui">
              <div className="vs-chip">🌐 Samal Island · 7.07°N</div>
              <div className="vs-chip">⬆ Virtual Tour Active</div>
            </div>
            <div className="vs-compass">↑</div>
          </div>
          <div className="vs-ctas">
            <a href="#" className="btn-glass">Launch Full VR Experience</a>
            <a href="#" className="btn-g">Download Island Map</a>
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer>
        <div className="ft-brand">Almeja <em>Azul</em></div>
        <p className="ft-note">Concepts & Future Projects · Not yet operational</p>
        <a href="Almeja Azul.html" className="ft-back">← Back to Resort</a>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
