<style>
.page-hero{height:70vh;min-height:520px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:0 72px 88px;}
.page-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.page-hero-vgn{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,37,48,0.92) 0%,rgba(26,37,48,0.25) 60%,transparent 100%);}
.page-hero-content{position:relative;z-index:1;max-width:680px;}
.page-hero-content p.eyebrow{font-size:10px;font-weight:600;letter-spacing:0.26em;text-transform:uppercase;color:var(--c-brand);margin-bottom:16px;opacity:0;transform:translateY(12px);animation:fUp 0.9s var(--ease) 0.3s forwards;}
.page-hero-content h1{opacity:0;transform:translateY(14px);animation:fUp 0.9s var(--ease) 0.5s forwards;}
.page-hero-content .sub{font-size:15px;font-weight:300;color:rgba(255,255,255,0.6);line-height:1.75;margin-top:16px;max-width:440px;opacity:0;animation:fUp 0.9s var(--ease) 0.7s forwards;}

/* tab nav */
.tab-nav{background:var(--c-ink);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;padding:0 72px;}
.tab-btn{padding:18px 28px;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.45);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.25s;font-family:var(--ff-n);}
.tab-btn:hover{color:rgba(255,255,255,0.75);}
.tab-btn.on{color:var(--c-brand);border-bottom-color:var(--c-brand);}

/* corporate */
.corp-section{padding:100px 72px;background:var(--c-oyster);}
.corp-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;margin-top:64px;}
.corp-desc{font-size:15px;font-weight:300;color:rgba(26,37,48,0.65);line-height:1.8;margin-bottom:32px;}
.corp-packages{display:flex;flex-direction:column;gap:16px;margin-bottom:36px;}
.pkg-card{background:var(--c-sand);border-radius:8px;padding:24px 28px;border-left:3px solid var(--c-brand);transition:box-shadow 0.3s;}
.pkg-card:hover{box-shadow:0 8px 32px rgba(26,37,48,0.10);}
.pkg-name{font-family:var(--ff-s);font-size:26px;font-weight:300;margin-bottom:6px;}
.pkg-includes{font-size:13px;font-weight:300;color:rgba(26,37,48,0.6);line-height:1.65;margin-bottom:12px;}
.pkg-price{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--c-brand);}
.corp-visual img{width:100%;border-radius:6px;margin-bottom:16px;}
.corp-visual img:last-child{margin-bottom:0;}
.corp-visual{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.corp-visual img:first-child{grid-column:1/3;}

/* floor plan */
.floorplan-section{background:var(--c-sand);padding:100px 72px;}
.floorplan-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;margin-top:64px;}
.fp-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 4px 24px rgba(26,37,48,0.06);}
.fp-card-header{background:var(--c-teal);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;}
.fp-card-title{font-family:var(--ff-s);font-size:24px;font-weight:300;color:#fff;}
.fp-card-cap{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(75,191,224,0.8);}
.fp-diagram{padding:28px;background:var(--c-oyster);}
.fp-svg{width:100%;height:auto;border-radius:4px;}
.fp-legend{padding:20px 28px;display:flex;gap:16px;flex-wrap:wrap;}
.fp-leg-item{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:300;color:rgba(26,37,48,0.65);}
.fp-leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.fp-info{padding:20px 28px;border-top:1px solid var(--c-sand);}
.fp-info p{font-size:13px;font-weight:300;color:rgba(26,37,48,0.6);line-height:1.65;margin-bottom:12px;}
.fp-info a{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--c-brand);text-decoration:none;}

/* weddings */
.wed-section{padding:100px 72px;background:var(--c-oyster);}
.wed-intro{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;margin-bottom:80px;}
.wed-img-stack{position:relative;}
.wed-img-main{width:100%;border-radius:6px;aspect-ratio:4/3;object-fit:cover;}
.wed-img-inset{position:absolute;bottom:-20px;right:-20px;width:55%;border-radius:6px;border:4px solid #fff;box-shadow:0 8px 32px rgba(26,37,48,0.15);}
.wed-venue-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:56px;}
.wed-venue{position:relative;overflow:hidden;border-radius:6px;cursor:pointer;}
.wed-venue img{width:100%;aspect-ratio:16/9;object-fit:cover;transition:transform 0.85s var(--ease);}
.wed-venue:hover img{transform:scale(1.06);}
.wed-venue-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,37,48,0.85) 0%,transparent 55%);}
.wed-venue-body{position:absolute;bottom:0;left:0;right:0;padding:24px;}
.wed-venue-tag{font-size:9px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--c-brand);margin-bottom:6px;}
.wed-venue-name{font-family:var(--ff-s);font-size:32px;font-weight:300;color:#fff;margin-bottom:4px;}
.wed-venue-sub{font-size:12px;color:rgba(255,255,255,0.6);}

/* inquiry */
.inquiry-section{background:var(--c-teal);padding:100px 72px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
.inq-form{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:40px;}
.inq-form h3{font-family:var(--ff-s);font-size:32px;font-weight:300;color:#fff;margin-bottom:24px;}
.inq-row{margin-bottom:18px;}
.inq-label{font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:7px;display:block;}
.inq-pill-row{display:flex;flex-wrap:wrap;gap:8px;}
.inq-pill{padding:7px 16px;border:1px solid rgba(75,191,224,0.35);border-radius:100px;font-size:12px;color:rgba(255,255,255,0.65);cursor:pointer;transition:all 0.2s;background:transparent;font-family:var(--ff-n);}
.inq-pill:hover,.inq-pill.on{background:rgba(75,191,224,0.2);border-color:var(--c-brand);color:var(--c-brand);}
.inq-ctas{display:flex;flex-direction:column;gap:10px;margin-top:24px;}

/* ── MOBILE ── */
@media (max-width: 1024px) {
  .corp-grid { grid-template-columns: 1fr; gap: 48px; }
  .floorplan-grid { grid-template-columns: 1fr; gap: 40px; }
  .wed-intro { grid-template-columns: 1fr; gap: 48px; }
  .wed-venue-grid { grid-template-columns: 1fr; }
  .inquiry-section { grid-template-columns: 1fr; gap: 48px; }
}
@media (max-width: 720px) {
  .page-hero { padding: 0 24px 64px; min-height: 460px; }
  .tab-nav { padding: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab-btn { padding: 14px 18px; font-size: 10px; white-space: nowrap; flex-shrink: 0; }
  .corp-section, .floorplan-section, .wed-section, .inquiry-section { padding: 56px 24px; }
  .pkg-card { padding: 18px 20px; }
  .pkg-name { font-size: 22px; }
  .fp-card-header { padding: 16px 20px; flex-direction: column; align-items: flex-start; gap: 6px; }
  .fp-card-title { font-size: 20px; }
  .fp-diagram { padding: 18px; }
  .fp-info, .fp-legend { padding: 16px 20px; }
  .fp-legend { gap: 10px; }
  .wed-img-inset { width: 50%; right: -10px; bottom: -10px; }
  .inq-form { padding: 24px; }
  .inq-form h3 { font-size: 24px; }
}
</style>
</head>

const _lbl={fontSize:10,fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(26,37,48,0.45)',display:'block',marginBottom:7};
const _inp={width:'100%',padding:'10px 14px',background:'var(--c-sand)',border:'1px solid rgba(26,37,48,0.12)',borderRadius:6,fontFamily:'var(--ff-n)',fontSize:14,color:'var(--c-ink)',outline:'none',boxSizing:'border-box'};
const _pill=(on)=>({padding:'6px 14px',border:`1px solid ${on?'var(--c-brand)':'rgba(26,37,48,0.2)'}`,borderRadius:100,fontSize:11,color:on?'var(--c-ink)':'rgba(26,37,48,0.65)',cursor:'pointer',background:on?'var(--c-brand)':'transparent',fontFamily:'var(--ff-n)',transition:'all 0.2s'});
const NEEDS_OPTS=['Function Hall','Meeting Room','Accommodation','All Meals','Team Activities','AV & Projector','Island Tour','Beach Access','Transfers'];

function PackageModal({pkg,onClose}){
  const [on,setOn]=React.useState(false);
  const [pax,setPax]=React.useState('');
  const [dur,setDur]=React.useState('');
  const [needs,setNeeds]=React.useState([]);
  const [rooms,setRooms]=React.useState('');
  const toggle=n=>setNeeds(p=>p.includes(n)?p.filter(x=>x!==n):[...p,n]);
  React.useEffect(()=>{const t=setTimeout(()=>setOn(true),10);const esc=e=>e.key==='Escape'&&onClose();document.addEventListener('keydown',esc);document.body.style.overflow='hidden';return()=>{clearTimeout(t);document.removeEventListener('keydown',esc);document.body.style.overflow='';};},[]);
  return(
    <div className={`mOverlay${on?' on':''}`} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:960}}>
        <div className="m-gallery">
          <img src={pkg.img} alt={pkg.name}/>
          <button className="m-close" onClick={onClose}>✕</button>
          <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'24px',background:'linear-gradient(to top,rgba(26,37,48,0.92),transparent)'}}>
            <p style={{fontSize:9,fontWeight:700,letterSpacing:'0.22em',textTransform:'uppercase',color:'var(--c-brand)',marginBottom:6}}>{pkg.minPax}–{pkg.maxPax} pax · {pkg.duration.join(' / ')}</p>
            <h3 style={{fontFamily:'var(--ff-s)',fontSize:28,fontWeight:300,color:'#fff',lineHeight:1.1}}>{pkg.name}</h3>
          </div>
        </div>
        <div className="m-body">
          <p className="m-tag">Corporate Package</p>
          <h2 className="m-name" style={{fontSize:30}}>{pkg.name}</h2>
          <p className="m-meta">{pkg.price}</p>
          <div className="m-hr"/>
          <p className="m-desc">{pkg.detail}</p>
          <div className="m-amenities" style={{marginBottom:20}}>{pkg.features.map(f=><div key={f} className="m-amen-item">{f}</div>)}</div>
          <div className="m-hr"/>
          <p style={{fontSize:10,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',color:'rgba(26,37,48,0.38)',marginBottom:16}}>Build Your Quote</p>
          <div style={{marginBottom:14}}>
            <label style={_lbl}>How many people?</label>
            <input type="number" placeholder={`${pkg.minPax} – ${pkg.maxPax}`} min={pkg.minPax} max={pkg.maxPax} value={pax} onChange={e=>setPax(e.target.value)} style={_inp}/>
          </div>
          <div style={{marginBottom:14}}>
            <label style={_lbl}>How long?</label>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{pkg.duration.map(d=><button key={d} onClick={()=>setDur(d)} style={_pill(dur===d)}>{d}</button>)}</div>
          </div>
          <div style={{marginBottom:14}}>
            <label style={_lbl}>What do you need?</label>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{NEEDS_OPTS.map(n=><button key={n} onClick={()=>toggle(n)} style={_pill(needs.includes(n))}>{n}</button>)}</div>
          </div>
          {needs.includes('Accommodation')&&(
            <div style={{marginBottom:14}}>
              <label style={_lbl}>How many rooms?</label>
              <input type="number" placeholder="e.g. 5" min="1" max="30" value={rooms} onChange={e=>setRooms(e.target.value)} style={_inp}/>
            </div>
          )}
          <div className="m-ctas" style={{marginTop:20}}>
            <a href="https://m.me/AlmejaAzulResort" target="_blank" className="m-book">Send Inquiry on Messenger →</a>
            <a href="tel:09993088800" className="m-book-fb" style={{display:'flex',alignItems:'center',gap:8,justifyContent:'center'}}><IconPhone size={14}/>0999 308 8800</a>
          </div>
        </div>
      </div>
    </div>
  );
}

  return(
