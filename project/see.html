<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>See & Explore — Almeja Azul · Samal Island</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="inquiry-modal.jsx"></script>
<style>
.see-hero{height:70vh;min-height:500px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:0 72px 88px;}
.see-hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=2400&q=90') center 45%/cover;animation:hZoom 20s ease-in-out infinite alternate;}
@keyframes hZoom{from{transform:scale(1.03)}to{transform:scale(1.08)}}
.see-hero-vgn{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,37,48,0.90) 0%,rgba(26,37,48,0.2) 60%,transparent 100%);}
.see-hero-content{position:relative;z-index:1;max-width:680px;}
.see-hero-content .eyebrow{font-size:10px;font-weight:600;letter-spacing:0.26em;text-transform:uppercase;color:var(--c-brand);margin-bottom:16px;opacity:0;transform:translateY(12px);animation:fUp 0.9s var(--ease) 0.3s forwards;}
.see-hero-content h1{opacity:0;animation:fUp 0.9s var(--ease) 0.5s forwards;}
.see-hero-content .sub{font-size:15px;color:rgba(255,255,255,0.60);font-weight:300;line-height:1.75;margin-top:16px;opacity:0;animation:fUp 0.9s var(--ease) 0.7s forwards;}

/* tours */
.tours-section{padding:100px 72px;background:var(--c-oyster);}
.tours-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:56px;}
.tour-card{background:#fff;border-radius:6px;overflow:hidden;cursor:pointer;transition:transform 0.4s var(--ease),box-shadow 0.4s;}
.tour-card:hover{transform:translateY(-7px);box-shadow:0 20px 56px rgba(26,37,48,0.13);}
.tour-img{width:100%;aspect-ratio:4/3;object-fit:cover;transition:transform 0.85s var(--ease);}
.tour-card:hover .tour-img{transform:scale(1.05);}
.tour-body{padding:24px 26px 28px;}
.tour-tag{font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--c-brand);margin-bottom:8px;}
.tour-name{font-family:var(--ff-s);font-size:28px;font-weight:300;margin-bottom:6px;}
.tour-desc{font-size:13px;font-weight:300;color:rgba(26,37,48,0.60);line-height:1.65;margin-bottom:16px;}
.tour-foot{display:flex;align-items:center;justify-content:space-between;}
.tour-price{font-family:var(--ff-s);font-size:20px;color:var(--c-brand);}
.tour-arr{width:34px;height:34px;border-radius:50%;border:1px solid rgba(26,37,48,0.15);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.35s var(--ease);}
.tour-card:hover .tour-arr{background:var(--c-brand);border-color:var(--c-brand);color:var(--c-ink);}

/* samal intro */
.samal-section{padding:100px 72px;background:var(--c-teal);display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
.samal-imgs{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.samal-imgs img{width:100%;border-radius:4px;object-fit:cover;}
.samal-imgs img:first-child{aspect-ratio:3/4;grid-row:1/3;}
.samal-imgs img:not(:first-child){aspect-ratio:4/3;}

/* nature */
.nature-section{padding:100px 72px;background:var(--c-sand);}
.nature-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:56px;}
.nature-card{display:grid;grid-template-columns:180px 1fr;gap:0;background:#fff;border-radius:6px;overflow:hidden;transition:transform 0.35s var(--ease);}
.nature-card:hover{transform:translateX(6px);}
.nature-card img{width:100%;height:100%;object-fit:cover;}
.nature-body{padding:24px;}
.nature-tag{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--c-sage);margin-bottom:8px;}
.nature-name{font-family:var(--ff-s);font-size:24px;font-weight:300;margin-bottom:8px;}
.nature-desc{font-size:13px;font-weight:300;color:rgba(26,37,48,0.60);line-height:1.65;}

/* book CTA */
.see-cta{background:var(--c-ink);padding:88px 72px;display:flex;align-items:center;justify-content:space-between;gap:48px;}
.see-cta h2{font-family:var(--ff-s);font-size:56px;font-weight:300;color:#fff;}
.see-cta h2 em{font-style:italic;color:var(--c-brand);}
.see-cta p{font-size:15px;color:rgba(255,255,255,0.5);margin-top:10px;font-weight:300;}
.see-cta-actions{flex-shrink:0;display:flex;flex-direction:column;gap:12px;min-width:260px;}

/* ── MOBILE ── */
@media (max-width: 1024px) {
  .tours-grid { grid-template-columns: 1fr 1fr; }
  .samal-section { grid-template-columns: 1fr; gap: 48px; }
  .nature-grid { grid-template-columns: 1fr; }
}
@media (max-width: 720px) {
  .see-hero { padding: 0 24px 64px; min-height: 420px; }
  .tours-section, .samal-section, .nature-section { padding: 56px 24px; }
  .tours-grid { grid-template-columns: 1fr; gap: 14px; }
  .tour-body { padding: 18px 20px 22px; }
  .tour-name { font-size: 22px; }
  .nature-card { grid-template-columns: 110px 1fr; }
  .nature-body { padding: 16px 18px; }
  .nature-name { font-size: 18px; }
  .nature-desc { font-size: 12px; }
  .see-cta { flex-direction: column; padding: 56px 24px; align-items: flex-start; gap: 24px; }
  .see-cta h2 { font-size: 36px; }
  .see-cta-actions { width: 100%; min-width: 0; }
}
</style>
</head>
<body>
<a href="https://m.me/AlmejaAzulResort" target="_blank" class="fb-float-sm" title="Message us on Facebook">
  <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.145 2 11.259c0 2.869 1.37 5.43 3.519 7.129V22l3.206-1.747c.857.234 1.765.36 2.705.36 5.523 0 10-4.145 10-9.259C22 6.145 17.523 2 12 2z"/></svg>
</a>
<div id="root"></div>
<script>
window.addEventListener('scroll',()=>document.querySelector('.nav')?.classList.toggle('scrolled',window.scrollY>50));
</script>
<script type="text/babel">
const {useState}=React;
const TOURS=[
  {tag:'Water',name:'Reef Snorkeling Tour',desc:'Guided snorkeling to the reef systems off Samal Island. Gear included. Best visibility: 7–10 AM.',price:'From ₱500/pax',img:'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=700&q=80',detail:'A guided reef snorkeling experience led by our resident marine guide. We take you to the best coral formations in the area. Equipment, life vests, and safety briefing included. Maximum 8 persons per group.',includes:['Snorkeling gear','Life vest','Marine guide','Max 8 per group','Safety briefing','Bottled water'],duration:'2–3 hours'},
  {tag:'Island',name:'Island Hopping',desc:'Bangka tour to neighboring Samal Island highlights — white sand bars, caves, and open sea.',price:'Inquire for rates',img:'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=700&q=80',detail:'A classic Samal Island experience — our bangka takes you to key island spots including white sand bars, cave formations, and panoramic open-sea viewpoints. Custom itinerary available.',includes:['Private bangka','Life vests','Cooler & drinks','Custom itinerary','Island guide','Sunset option'],duration:'Half-day or full-day'},
  {tag:'Nature',name:'Mangrove Kayak Tour',desc:'Guided kayak through Almeja Azul\'s mangrove sanctuary at dawn or dusk. Single and double kayaks.',price:'From ₱350/pax',img:'https://images.unsplash.com/photo-1472745942893-4b9f730c7668?w=700&q=80',detail:'Paddle silently through the mangrove root systems bordering the resort. Dawn tours offer the best light and wildlife activity. Dusk tours offer a completely different atmosphere as the forest comes alive.',includes:['Single or double kayak','Life vest','Guide','Dawn or dusk slot','Dry bag available','Photography stops'],duration:'1.5 hours'},
  {tag:'Dive',name:'Davao Gulf Diving',desc:'Partner-access scuba diving in the rich waters of the Davao Gulf. Dive shop coordination available.',price:'Inquire for packages',img:'https://images.unsplash.com/photo-1560275619-4cc5fa59d3ae?w=700&q=80',detail:'Samal Island sits at the edge of the Davao Gulf — one of the most biodiverse marine environments in the Philippines. Scuba diving packages coordinated through our partner dive shops.',includes:['Dive partner coordination','Equipment (partner)','Briefing included','Multi-dive packages','Beginner-friendly','Underwater photography option'],duration:'Half-day per dive'},
  {tag:'Cultural',name:'Samal Village Walk',desc:'A guided walk through the local community, fishing village, and cultural landmarks of Brgy. Adecor.',price:'From ₱250/pax',img:'https://images.unsplash.com/photo-1527631746610-bca00a040d60?w=700&q=80',detail:'Go beyond the resort gates. Our local guide leads a 90-minute walk through the fishing community of Brgy. Adecor — meeting residents, learning the history of the island, and seeing Samal through local eyes.',includes:['Local guide','Community visits','Cultural context','Small group max 8','Refreshments stop','Photography welcome'],duration:'90 minutes'},
  {tag:'Eco',name:'Giant Clam Viewing',desc:'Snorkel to see Tridacna gigas — the giant clams Almeja Azul is named after — in their natural habitat.',price:'From ₱400/pax',img:'https://images.unsplash.com/photo-1559825481-12a05cc00344?w=700&q=80',detail:'The Almeja Azul name comes from the Spanish for "blue clam" — the spectacular giant clams (Tridacna gigas) found in Samal waters. This guided tour takes you to view them in their natural reef habitat.',includes:['Snorkel gear','Marine guide','Giant clam sites','Conservation briefing','Limited to 6 pax','Best at low tide'],duration:'2 hours'},
];

function TourModal({tour,onClose}){
  const [on,setOn]=React.useState(false);
  React.useEffect(()=>{const t=setTimeout(()=>setOn(true),10);const esc=e=>e.key==='Escape'&&onClose();document.addEventListener('keydown',esc);document.body.style.overflow='hidden';return()=>{clearTimeout(t);document.removeEventListener('keydown',esc);document.body.style.overflow='';};},[]);
  return(
    <div className={`mOverlay${on?' on':''}`} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="m-gallery"><img src={tour.img} alt={tour.name}/><button className="m-close" onClick={onClose}>✕</button></div>
        <div className="m-body">
          <p className="m-tag">{tour.tag} · {tour.duration}</p>
          <h2 className="m-name">{tour.name}</h2>
          <p className="m-meta">Almeja Azul · Samal Island, Davao del Norte</p>
          <div className="m-hr"/>
          <p className="m-desc">{tour.detail}</p>
          <div className="m-amenities">{tour.includes.map(i=><div key={i} className="m-amen-item">{i}</div>)}</div>
          <div className="m-price-box"><div className="m-price-label">Pricing</div><div className="m-price-val" style={{fontSize:30}}>{tour.price}</div></div>
          <div className="m-ctas">
            <a href="https://m.me/AlmejaAzulResort" target="_blank" className="m-book">Book on Facebook Messenger</a>
            <a href="tel:09993088800" className="m-book-fb">📞 0999 308 8800</a>
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [active,setActive]=useState(null);
  return(
    <>
      <nav className="nav">
        <a href="Almeja Azul.html" className="nav-logo"><img src="uploads/Almeja Logo_Large_PNG.png" alt="Almeja Azul"/></a>
        <button className="nav-toggle" onClick={()=>{document.querySelector('.nav-links').classList.toggle('open');document.querySelector('.nav-toggle').classList.toggle('open');}} aria-label="Menu"><span/><span/><span/></button>
        <div className="nav-links">
          {[['Stay','stay.html'],['Day Tour','day-tour.html'],['Fun','fun.html'],['Build','build.html'],['See','see.html']].map(([l,h])=>(
            <a key={l} href={h} className={`nav-link${l==='See'?' active':''}`}>{l}</a>
          ))}
        </div>
        <div className="nav-actions">
          <a href="tel:09993088800" className="nav-phone">0999 308 8800</a>
          <button className="nav-book" onClick={()=>window.openInquiry&&window.openInquiry('Island Tour')}>Book a Tour</button>
        </div>
      </nav>

      <section className="see-hero">
        <div className="see-hero-bg"/><div className="see-hero-vgn"/>
        <div className="see-hero-content">
          <p className="eyebrow">Tours · Nature · Island Exploration</p>
          <h1 className="s-title-light">The Island<br/><em>Beyond</em> the Beach</h1>
          <p className="sub">Samal Island is more than a resort destination — it is a living ecosystem of coral reefs, mangrove forests, fishing villages, and giant clams. We help you see all of it.</p>
        </div>
      </section>

      <section className="tours-section">
        <p className="s-eyebrow">Available Tours</p>
        <h2 className="s-title">Explore <em>Samal</em></h2>
        <div className="tours-grid">
          {TOURS.map(t=>(
            <div key={t.name} className="tour-card rpl" onClick={()=>setActive(t)}>
              <img className="tour-img" src={t.img} alt={t.name} loading="lazy"/>
              <div className="tour-body">
                <p className="tour-tag">{t.tag}</p>
                <h3 className="tour-name">{t.name}</h3>
                <p className="tour-desc">{t.desc}</p>
                <div className="tour-foot">
                  <div className="tour-price">{t.price}</div>
                  <div className="tour-arr">→</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </section>

      <section className="samal-section">
        <div>
          <p className="s-eyebrow-light">About Samal Island</p>
          <h2 className="s-title-light">The <em>Island</em> of<br/>Giant Clams</h2>
          <p className="s-body-light" style={{marginTop:20,marginBottom:28}}>Samal Island — officially the Island Garden City of Samal — is a 35,000-hectare island municipality just 5 minutes by bangka from Davao City. Its coastline holds some of the most biodiverse reef systems in the Philippines, including wild populations of the massive Tridacna gigas — the giant clam that gives Almeja Azul its name.</p>
          <p className="s-body-light" style={{marginBottom:32}}>Seven kilometers of white sand beaches. Coral gardens. Bat caves. Mangrove forest. And one of the best-connected island retreats in the Visayas-Mindanao corridor — fiber internet included.</p>
          <div style={{display:'flex',gap:12}}>
            <a href="https://m.me/AlmejaAzulResort" target="_blank" className="btn-brand">Plan Your Visit</a>
            <a href="stay.html" className="btn-outline">Book a Room</a>
          </div>
        </div>
        <div className="samal-imgs">
          <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500&q=80" alt="Beach" style={{aspectRatio:'3/4'}}/>
          <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&q=80" alt="Mangrove" style={{aspectRatio:'4/3'}}/>
          <img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=400&q=80" alt="Coral" style={{aspectRatio:'4/3'}}/>
        </div>
      </section>

      <section className="nature-section">
        <p className="s-eyebrow">Natural Highlights</p>
        <h2 className="s-title">What Makes <em>Samal</em> Special</h2>
        <div className="nature-grid">
          {[
            {tag:'Marine Life',name:'Giant Clams',desc:'Tridacna gigas — the inspiration behind the resort name. Wild populations visible on guided snorkel tours.',img:'https://images.unsplash.com/photo-1559825481-12a05cc00344?w=400&q=80'},
            {tag:'Ecosystem',name:'Mangrove Forest',desc:'Ancient root systems at the edge of the resort. Home to coastal birds, mudskippers, and medicinal plants.',img:'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&q=80'},
            {tag:'Reef',name:'Coral Gardens',desc:'Some of the most intact coral ecosystems in the Davao Gulf — accessible within minutes by bangka.',img:'https://images.unsplash.com/photo-1560275619-4cc5fa59d3ae?w=400&q=80'},
            {tag:'Birdlife',name:'Coastal Birds',desc:'The mangrove edge at dawn is alive with kingfishers, herons, and the rare Samal Island endemic species.',img:'https://images.unsplash.com/photo-1444464666168-49d633b86797?w=400&q=80'},
          ].map(n=>(
            <div key={n.name} className="nature-card">
              <img src={n.img} alt={n.name} loading="lazy"/>
              <div className="nature-body">
                <p className="nature-tag">{n.tag}</p>
                <h3 className="nature-name">{n.name}</h3>
                <p className="nature-desc">{n.desc}</p>
              </div>
            </div>
          ))}
        </div>
      </section>

      <div className="see-cta">
        <div>
          <h2>Ready to <em>explore?</em></h2>
          <p>Message us to book any tour. Same-day confirmation available.</p>
        </div>
        <div className="see-cta-actions">
          <a href="https://m.me/AlmejaAzulResort" target="_blank" className="btn-brand" style={{textAlign:'center'}}>Book a Tour on Messenger</a>
          <a href="https://www.facebook.com/AlmejaAzulResort/" target="_blank" className="btn-outline" style={{textAlign:'center'}}>View Facebook Page</a>
          <a href="tel:09993088800" className="btn-outline" style={{textAlign:'center'}}>📞 0999 308 8800</a>
        </div>
      </div>

      <footer className="site-footer">
        <div className="footer-grid">
          <div className="footer-brand"><img src="uploads/Almeja Logo_Large_PNG.png" alt="Almeja Azul"/><p>Explore Samal Island from the inside. Guided tours, reef snorkeling, and nature walks — all from Almeja Azul.</p><div className="footer-social"><a href="https://www.facebook.com/AlmejaAzulResort/" target="_blank" className="f-soc">FB</a><a href="https://m.me/AlmejaAzulResort" target="_blank" className="f-soc">M</a></div></div>
          <div className="footer-col"><h4>Explore</h4><ul><li><a href="Almeja Azul.html">Home</a></li><li><a href="stay.html">Stay</a></li><li><a href="day-tour.html">Day Tour</a></li><li><a href="fun.html">Fun</a></li><li><a href="build.html">Build</a></li><li><a href="see.html">See</a></li></ul></div>
          <div className="footer-col"><h4>Tours</h4><ul>{TOURS.slice(0,4).map(t=><li key={t.name}><a href="#" onClick={e=>{e.preventDefault();setActive(t);}}>{t.name}</a></li>)}</ul></div>
          <div className="footer-col"><h4>Stay</h4><ul><li><a href="stay.html">All Rooms</a></li><li><a href="day-tour.html">Day Tour</a></li><li><a href="fun.html">Recreation</a></li><li><a href="build.html">Events</a></li></ul></div>
          <div className="footer-col"><h4>Book</h4><ul><li><a href="tel:09993088800">0999 308 8800</a></li><li><a href="https://m.me/AlmejaAzulResort" target="_blank">Messenger</a></li><li><a href="https://www.facebook.com/AlmejaAzulResort/" target="_blank">Facebook</a></li></ul></div>
        </div>
        <div className="footer-bottom"><span>© 2026 Almeja Azul · Brgy. Adecor, Samal Island</span><span>0999 308 8800</span></div>
      </footer>
      {active&&<TourModal tour={active} onClose={()=>setActive(null)}/>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
