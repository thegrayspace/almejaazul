<style>
.page-hero { height:65vh; min-height:460px; position:relative; overflow:hidden; display:flex; align-items:flex-end; padding:0 72px 80px; }
.page-hero-bg { position:absolute; inset:0; background-size:cover; background-position:center; }
.page-hero-vgn { position:absolute; inset:0; background:linear-gradient(to top,rgba(26,37,48,0.92) 0%,rgba(26,37,48,0.2) 65%,transparent 100%); }
.page-hero-content { position:relative; z-index:1; }
.page-hero-content .hero-eyebrow { font-size:10px; font-weight:600; letter-spacing:0.26em; text-transform:uppercase; color:var(--c-brand); margin-bottom:16px; opacity:0; transform:translateY(12px); animation:fUp 0.9s var(--ease) 0.3s forwards; }
.page-hero-content h1 { opacity:0; transform:translateY(14px); animation:fUp 0.9s var(--ease) 0.5s forwards; }
.page-hero-content p { font-size:15px; font-weight:300; color:rgba(255,255,255,0.6); max-width:440px; line-height:1.75; margin-top:16px; opacity:0; transform:translateY(12px); animation:fUp 0.9s var(--ease) 0.7s forwards; }

/* sport grid */
.sports-section { padding:100px 72px; background:var(--c-oyster); }
.sports-hd { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:64px; }
.sports-desc { max-width:340px; font-size:15px; font-weight:300; color:rgba(26,37,48,0.6); line-height:1.75; }
.sports-grid { display:grid; grid-template-columns:repeat(12,1fr); gap:16px; }
.sport-card { position:relative; overflow:hidden; border-radius:4px; cursor:pointer; }
.sport-card:nth-child(1) { grid-column:1/6; grid-row:1; }
.sport-card:nth-child(2) { grid-column:6/13; grid-row:1; }
.sport-card:nth-child(3) { grid-column:1/5; grid-row:2; }
.sport-card:nth-child(4) { grid-column:5/9; grid-row:2; }
.sport-card:nth-child(5) { grid-column:9/13; grid-row:2; }
.sport-card:nth-child(6) { grid-column:1/7; grid-row:3; }
.sport-card:nth-child(7) { grid-column:7/13; grid-row:3; }
.sport-img { width:100%; display:block; transition:transform 0.9s var(--ease); }
.sport-card:nth-child(1) .sport-img,.sport-card:nth-child(2) .sport-img { aspect-ratio:16/9; }
.sport-card:nth-child(3) .sport-img,.sport-card:nth-child(4) .sport-img,.sport-card:nth-child(5) .sport-img { aspect-ratio:4/3; }
.sport-card:nth-child(6) .sport-img,.sport-card:nth-child(7) .sport-img { aspect-ratio:16/7; }
.sport-card img { object-fit:cover; }
.sport-card:hover .sport-img { transform:scale(1.06); }
.sport-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(26,37,48,0.88) 0%,rgba(26,37,48,0.1) 55%,transparent 100%); }
.sport-body { position:absolute; bottom:0; left:0; right:0; padding:20px 22px; }
.sport-cat { font-size:9px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:var(--c-brand); margin-bottom:6px; }
.sport-name { font-family:var(--ff-s); font-size:28px; font-weight:300; color:#fff; margin-bottom:4px; }
.sport-sub { font-size:12px; font-weight:300; color:rgba(255,255,255,0.6); margin-bottom:12px; }
.sport-pill { display:inline-block; padding:5px 14px; border:1px solid rgba(75,191,224,0.45); border-radius:100px; font-size:10px; font-weight:500; color:var(--c-brand); letter-spacing:0.06em; }

/* water section */
.water-section { padding:100px 72px; background:var(--c-teal); }
.water-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-top:56px; }
.water-card { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-radius:8px; overflow:hidden; cursor:pointer; transition:background 0.35s,border-color 0.35s,transform 0.35s var(--ease); }
.water-card:hover { background:rgba(255,255,255,0.12); border-color:rgba(75,191,224,0.4); transform:translateY(-4px); }
.water-card img { width:100%; aspect-ratio:16/9; object-fit:cover; }
.water-card-body { padding:22px 24px; }
.water-card-icon { color:var(--c-brand); margin-bottom:10px; line-height:0; }
.water-card-name { font-family:var(--ff-s); font-size:26px; font-weight:300; color:#fff; margin-bottom:6px; }
.water-card-sub { font-size:13px; font-weight:300; color:rgba(255,255,255,0.55); line-height:1.6; margin-bottom:16px; }
.water-card-price { font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--c-brand); }

/* leisure */
.leisure-section { padding:100px 72px; background:var(--c-sand); }
.leisure-list { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-top:56px; }
.leisure-item { background:#fff; border-radius:6px; padding:28px 22px; display:flex; flex-direction:column; gap:10px; transition:transform 0.35s var(--ease),box-shadow 0.35s; cursor:pointer; }
.leisure-item:hover { transform:translateY(-5px); box-shadow:0 16px 40px rgba(26,37,48,0.10); }
.leisure-icon { color:var(--c-brand); line-height:0; }
.leisure-name { font-family:var(--ff-s); font-size:24px; font-weight:300; color:var(--c-ink); }
.leisure-desc { font-size:13px; font-weight:300; color:rgba(26,37,48,0.60); line-height:1.6; }
.leisure-avail { font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--c-brand); margin-top:auto; }

/* cta strip */
.fun-cta { background:var(--c-ink); padding:72px; display:flex; align-items:center; justify-content:space-between; gap:40px; }
.fun-cta h2 { font-family:var(--ff-s); font-size:52px; font-weight:300; color:#fff; }
.fun-cta h2 em { font-style:italic; color:var(--c-brand); }
.fun-cta p { font-size:15px; color:rgba(255,255,255,0.5); margin-top:10px; font-weight:300; }
.fun-cta-actions { display:flex; flex-direction:column; gap:12px; flex-shrink:0; min-width:260px; }

/* modal */
.sport-modal-body { padding:40px 44px; overflow-y:auto; max-height:88vh; }

/* ── MOBILE ── */
@media (max-width: 1024px) {
  .sports-grid { grid-template-columns: 1fr 1fr; }
  .sports-grid .sport-card { grid-column: auto !important; grid-row: auto !important; }
  .sports-grid .sport-card .sport-img { aspect-ratio: 16/10; }
  .water-grid { grid-template-columns: 1fr 1fr; }
  .leisure-list { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 720px) {
  .page-hero { padding: 0 24px 56px; min-height: 380px; }
  .sports-section, .water-section, .leisure-section { padding: 56px 24px; }
  .sports-hd { flex-direction: column; align-items: flex-start; gap: 20px; margin-bottom: 32px; }
  .sports-desc { max-width: 100%; font-size: 14px; }
  .sports-grid { grid-template-columns: 1fr; }
  .sports-grid .sport-card .sport-img { aspect-ratio: 16/10 !important; }
  .sport-name { font-size: 22px; }
  .water-grid, .leisure-list { grid-template-columns: 1fr 1fr; gap: 10px; }
  .water-card-body, .leisure-item { padding: 18px 14px; }
  .water-card-name, .leisure-name { font-size: 18px; }
  .fun-cta { flex-direction: column; padding: 56px 24px; align-items: flex-start; gap: 24px; }
  .fun-cta h2 { font-size: 36px; }
  .fun-cta-actions { width: 100%; min-width: 0; }
}
</style>

function SportModal({sport,onClose}){
  const [on,setOn]=React.useState(false);
  React.useEffect(()=>{const t=setTimeout(()=>setOn(true),10);const esc=e=>e.key==='Escape'&&onClose();document.addEventListener('keydown',esc);document.body.style.overflow='hidden';return()=>{clearTimeout(t);document.removeEventListener('keydown',esc);document.body.style.overflow='';};},[]);
  return(
    <div className={`mOverlay${on?' on':''}`} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="m-gallery"><img src={sport.img} alt={sport.name}/><button className="m-close" onClick={onClose}>✕</button></div>
        <div className="m-body">
          <p className="m-tag">{sport.cat}</p>
          <h2 className="m-name">{sport.name}</h2>
          <p className="m-meta">{sport.sub}</p>
          <div className="m-hr"/>
          <p className="m-desc">{sport.desc}</p>
          <div className="m-amenities">{sport.features.map(f=><div key={f} className="m-amen-item">{f}</div>)}</div>
          <div className="m-price-box"><div className="m-price-label">Pricing</div><div className="m-price-val" style={{fontSize:28}}>{sport.price}</div></div>
          <div className="m-ctas">
            <a href="https://m.me/AlmejaAzulResort" target="_blank" className="m-book">Inquire on Facebook Messenger</a>
            <a href="tel:09993088800" className="m-book-fb" style={{display:'flex',alignItems:'center',gap:8,justifyContent:'center'}}><IconPhone size={14}/>0999 308 8800</a>
          </div>
        </div>
      </div>
    </div>
  );
}
