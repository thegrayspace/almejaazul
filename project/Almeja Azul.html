<script>
window.addEventListener('scroll', () => {
  document.querySelector('.nav')?.classList.toggle('scrolled', window.scrollY > 50);
  // Mangrove parallax
  const mg = document.querySelector('.mg-bg');
  if (mg) {
    const section = mg.closest('.mangrove');
    const rect = section.getBoundingClientRect();
    const pct = (rect.top / window.innerHeight);
    mg.style.transform = `translateY(${pct * -60}px)`;
  }
});
document.addEventListener('click', e => {
  const t = e.target.closest('.rpl');
  if (!t) return;
  const r = t.getBoundingClientRect(), d = Math.max(r.width,r.height);
  const el = document.createElement('span');
  el.className = 'ripple-dot';
  el.style.cssText = `width:${d}px;height:${d}px;left:${e.clientX-r.left-d/2}px;top:${e.clientY-r.top-d/2}px`;
  t.appendChild(el); setTimeout(()=>el.remove(),700);
});
</script>
